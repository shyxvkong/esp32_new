<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IoT 设备管理中心</title>
    <style>
        :root {
            --bg-color: #f4f7f6;
            --card-bg: #ffffff;
            --primary: #2563eb;
            --primary-hover: #1d4ed8;
            --success: #10b981;
            --danger: #ef4444;
            --text-main: #1f2937;
            --text-sub: #6b7280;
            --border: #e5e7eb;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 20px;
        }

        .container { max-width: 1200px; margin: 0 auto; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--border);
        }

        h1 { font-size: 24px; font-weight: 600; color: var(--text-main); }
        
        .status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .dot {
            width: 10px; height: 10px;
            background-color: var(--success);
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
        }

        .stat-card h3 { font-size: 14px; color: var(--text-sub); font-weight: 500; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: 700; color: var(--primary); }

        .section-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .devices-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .device-card {
            background: var(--card-bg);
            border-radius: 12px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            overflow: hidden;
            transition: transform 0.2s;
        }

        .device-card:hover { transform: translateY(-2px); }

        .device-header {
            padding: 15px 20px;
            background: #f9fafb;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
			cursor: pointer;
        }

        .device-id { font-weight: 600; font-size: 16px; }
        
        .device-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 20px;
            background: #d1fae5;
            color: #065f46;
            font-weight: 500;
        }

        .device-body { padding: 20px; }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .info-label { color: var(--text-sub); }
        .info-value { font-weight: 500; }

        .data-box {
            background: #f3f4f6;
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: monospace;
            font-size: 13px;
            color: #374151;
            max-height: 100px;
            overflow-y: auto;
            word-break: break-all;
        }

        .actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-hover); }
        .btn-danger { background: white; color: var(--danger); border: 1px solid var(--danger); }
        .btn-danger:hover { background: #fef2f2; }

        /* 弹窗样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        .modal h3 { margin-bottom: 16px; }
        
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; margin-bottom: 6px; font-size: 14px; font-weight: 500; }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-sub);
            background: var(--card-bg);
            border-radius: 12px;
            border: 2px dashed var(--border);
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>📡 IoT 设备管理中心</h1>
        <div class="status-badge">
            <span class="dot"></span>
            <span>系统运行中 | 自动刷新: 3s</span>
        </div>
    </header>

    <div class="stats-grid">
        <div class="stat-card">
            <h3>在线设备数</h3>
            <div class="value" id="totalDevices">0</div>
        </div>
        <div class="stat-card">
            <h3>服务器运行时间</h3>
            <div class="value" id="serverUptime">0s</div>
        </div>
        <div class="stat-card">
            <h3>心跳超时阈值</h3>
            <div class="value" id="heartbeatTimeout">30s</div>
        </div>
    </div>

    <h2 class="section-title">📱 在线设备列表</h2>
    <div id="devicesContainer" class="devices-grid">
        <div class="empty-state">暂无设备连接，请等待设备上线...</div>
    </div>
</div>

<!-- 发送命令弹窗 -->
<div class="modal-overlay" id="commandModal">
    <div class="modal">
        <h3>下发指令到设备: <span id="modalDeviceId"></span></h3>
        <div class="form-group">
            <label>命令类型 (Command)</label>
            <input type="text" id="cmdType" placeholder="例如: reboot, set_interval">
        </div>
        <div class="form-group">
            <label>附加数据 (JSON 格式, 可选)</label>
            <input type="text" id="cmdData" placeholder='例如: {"interval": 5000}'>
        </div>
        <div class="modal-actions">
            <button class="btn btn-primary" onclick="sendCommand()">发送指令</button>
            <button class="btn btn-danger" onclick="closeModal()">取消</button>
        </div>
    </div>
</div>

<script>
    let currentDeviceId = '';

    // 格式化时间
    function formatTime(seconds) {
        if (seconds < 60) return `${seconds}s`;
        if (seconds < 3600) return `${Math.floor(seconds/60)}m ${seconds%60}s`;
        return `${Math.floor(seconds/3600)}h ${Math.floor((seconds%3600)/60)}m`;
    }

    // 获取服务器状态
    async function fetchStatus() {
        try {
            const res = await fetch('/api/status');
            const data = await res.json();
            if (data.success) {
                document.getElementById('totalDevices').textContent = data.connectedDevicesCount;
                document.getElementById('serverUptime').textContent = formatTime(data.serverUptime);
                document.getElementById('heartbeatTimeout').textContent = (data.heartbeatConfig.timeout / 1000) + 's';
            }
        } catch (e) { console.error('获取状态失败', e); }
    }

    // 获取设备列表
    async function fetchDevices() {
        try {
            const res = await fetch('/api/devices');
            const data = await res.json();
            const container = document.getElementById('devicesContainer');
            
            if (!data.success || Object.keys(data.devices).length === 0) {
                container.innerHTML = '<div class="empty-state">暂无设备连接，请等待设备上线...</div>';
                return;
            }

            let html = '';
            for (const [id, device] of Object.entries(data.devices)) {
				let lastSecond=Math.floor((Date.now() - device.lastHeartbeat)/1000);
				lastSecond<0&&(lastSecond=0);
                const sensorData = device.data ? JSON.stringify(device.data, null, 2) : '暂无数据';
                html += `
                    <div class="device-card">
                        <div class="device-header" onclick="javascrypt:location.href='/page/${id}';">
                            <span class="device-id">${id}</span>
                            <span class="device-status">在线</span>
                        </div>
                        <div class="device-body">
                            <div class="info-row">
                                <span class="info-label">IP 地址</span>
                                <span class="info-value">${device.remoteAddress}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">在线时长</span>
                                <span class="info-value">${formatTime(device.uptime)}</span>
                            </div>
                            <div class="info-row">
                                <span class="info-label">最后心跳</span>
                                <span class="info-value">${lastSecond}s 前</span>
                            </div>
                            
                            <div class="data-box">${sensorData}</div>
                            
                            <div class="actions">
                                <button class="btn btn-primary" onclick="openModal('${id}')">下发指令</button>
                                <button class="btn btn-danger" onclick="reconnectDevice('${id}')">强制重启</button>
                            </div>
                        </div>
                    </div>
                `;
            }
            container.innerHTML = html;
        } catch (e) { console.error('获取设备失败', e); }
    }

    // 弹窗控制
    function openModal(deviceId) {
        currentDeviceId = deviceId;
        document.getElementById('modalDeviceId').textContent = deviceId;
        document.getElementById('commandModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('commandModal').style.display = 'none';
        document.getElementById('cmdType').value = '';
        document.getElementById('cmdData').value = '';
    }

    // 发送命令
    async function sendCommand() {
        const command = document.getElementById('cmdType').value;
        const dataStr = document.getElementById('cmdData').value;
        
        if (!command) return alert('请输入命令类型');
        
        let data = {};
        if (dataStr) {
            try { data = JSON.parse(dataStr); } 
            catch (e) { return alert('附加数据必须是有效的 JSON 格式'); }
        }

        try {
            const res = await fetch(`/api/devices/${currentDeviceId}/command`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command, data })
            });
            const result = await res.json();
            if (result.success) {
                alert('指令下发成功！');
                closeModal();
            } else {
                alert('下发失败: ' + result.error);
            }
        } catch (e) {
            alert('网络请求失败');
        }
    }

    // 强制重连
    async function reconnectDevice(deviceId) {
        //if (!confirm(`确定要强制设备 ${deviceId} 重新连接吗？`)) return;
        
        try {
            const res = await fetch(`/api/devices/${deviceId}/reconnect`, { method: 'POST' });
            const result = await res.json();
            //if (result.success) {
            //    alert('已发送重连请求');
                fetchDevices(); // 刷新列表
            //}
        } catch (e) {
            alert('操作失败');
        }
    }

    // 初始化并定时刷新
    fetchStatus();
    fetchDevices();
    setInterval(() => {
        fetchStatus();
        fetchDevices();
    }, 1000); // 每3秒刷新一次
</script>

</body>
</html>
